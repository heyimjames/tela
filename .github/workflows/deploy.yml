name: Deploy to GitHub Pages

# Builds the static bundle and publishes it to GitHub Pages.
#
# To go live:
#   1. Make the repo public (Pages needs public, or a paid plan for private).
#   2. Settings → Pages → Source = "GitHub Actions".
#   3. Uncomment the `push:` trigger below so every push to main deploys.
#      (It's off by default so this workflow doesn't fail while Pages is unset.)
#
# The site is served from a project sub-path, so the build sets Vite's base to
# /<repo>/. Change it below if you rename the repo or use a custom domain.

on:
  # push:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -- --base=/tela/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
